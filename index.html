<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuromi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #2c1b42;
            overflow: hidden;
            position: fixed;
        }

        /* 漂浮文字样式 */
        .float-word {
            position: absolute;
            color: #e8c8ff;
            font-size: 26px;
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            animation: upFloat 12s linear infinite;
            opacity: 0.35;
        }

        @keyframes upFloat {
            0% {
                bottom: -50px;
                transform: translateX(0) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.4;
            }
            100% {
                bottom: 100vh;
                transform: translateX(60px) rotate(360deg);
                opacity: 0;
            }
        }

        /* 中间标题文字 */
        .center-title {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            color: #f3d4ff;
            font-weight: bold;
            letter-spacing: 6px;
        }
    </style>
</head>
<body>

<!-- 中间纯文字，无任何图片 -->
<div class="center-title">
    库洛米 Kuromi
</div>

<script>
// 漂浮文字列表
const wordList = ["Kuromi", "库洛米"];

// 创建漂浮文字
function createText(){
    let textDom = document.createElement("div");
    textDom.className = "float-word";
    let randomText = wordList[Math.floor(Math.random() * wordList.length)];
    textDom.innerText = randomText;

    textDom.style.left = Math.random() * 90 + "vw";
    textDom.style.animationDuration = 10 + Math.random() * 8 + "s";

    document.body.appendChild(textDom);
    setTimeout(()=>{
        textDom.remove();
    },18000);
}

setInterval(createText,700);
for(let i = 0; i < 20; i++){
    createText();
}

// 10次返回才能退出
let exitNum = 0;
const needExit = 10;
history.pushState({},'',location.href);

window.addEventListener("popstate",function(){
    exitNum++;
    if(exitNum < needExit){
        alert(`😈 不能走！还要点击退出 ${needExit - exitNum} 次`);
        history.pushState({},'',location.href);
    }
})
</script>

</body>
</html>
