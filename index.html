<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库洛米</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #2d1b44;
            overflow: hidden;
            position: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 漂浮文字样式 */
        .float-text {
            position: absolute;
            font-size: 22px;
            font-weight: bold;
            color: #f3d4ff;
            pointer-events: none;
            animation: float 10s linear infinite;
            opacity: 0.3;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.3;
            }
            85% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-200px) rotate(360deg);
                opacity: 0;
            }
        }

        /* 中间大库洛米 */
        .main-box {
            z-index: 99;
            text-align: center;
        }

        .main-kuromi {
            width: 240px;
            border-radius: 20px;
        }

        .title {
            color: #f3d4ff;
            font-size: 24px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="main-box">
        <img class="main-kuromi" src="https://img0.baidu.com/it/u=3802583223,1593772393&fm=253&fmt=auto" alt="库洛米">
        <h2 class="title">💜 库洛米 💜</h2>
    </div>

    <script>
        // 漂浮的文字内容（可自己改）
        const texts = ["库洛米", "可爱", "💜", "kuromi", "不许走", "喜欢你"];

        function createFloat() {
            let text = document.createElement("div");
            text.className = "float-text";
            // 随机选一句文字
            text.innerText = texts[Math.floor(Math.random() * texts.length)];
            text.style.left = Math.random() * 100 + "vw";
            text.style.animationDuration = 8 + Math.random() * 6 + "s";
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 15000);
        }

        // 自动生成漂浮文字
        setInterval(createFloat, 600);
        for (let i = 0; i < 15; i++) createFloat();

        // 必须点 10 次才能退出
        let count = 0;
        const max = 10;

        window.onbeforeunload = function (e) {
            count++;
            if (count < max) {
                return "不许退出哦～";
            }
        };

        window.addEventListener("popstate", function () {
            count++;
            if (count < max) {
                alert("不许随便关掉我😈 还需要点 " + (max - count) + " 次！");
                history.pushState({}, null, location.href);
            }
        });

        history.pushState({}, null, location.href);
    </script>

</body>
</html>
