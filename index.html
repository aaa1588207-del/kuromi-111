<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuromi</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            width:100vw;
            height:100vh;
            background:#2c1b42;
            overflow:hidden;
            position:fixed;
        }
        .float-word{
            position:absolute;
            color:#e8c8ff;
            font-size:24px;
            font-weight:bold;
            white-space:nowrap;
            pointer-events:none;
            animation:upFloat 12s linear infinite;
            opacity:0.35;
        }
        @keyframes upFloat{
            0%{bottom:-50px;transform:translateX(0) rotate(0deg);opacity:0;}
            20%{opacity:0.4;}
            100%{bottom:100vh;transform:translateX(60px) rotate(360deg);opacity:0;}
        }
        .center-title{
            width:100%;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:40px;
            color:#ffb3d9;
            font-weight:bold;
            text-align:center;
            padding:20px;
        }
    </style>
</head>
<body>

<div class="center-title" id="txt">库洛米 Kuromi</div>

<script>
// 漂浮文字
const words = ["Kuromi","库洛米"];
function fl(){
    let d = document.createElement("div");
    d.className = "float-word";
    d.innerText = words[Math.floor(Math.random()*words.length)];
    d.style.left = Math.random()*90+"vw";
    d.style.animationDuration = 10+Math.random()*8+"s";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),18000);
}
setInterval(fl,600);
for(let i=0;i<20;i++)fl();

// 10条生气文案
const list = [
    "不准走！",
    "你想逃离我？",
    "我已经不高兴了",
    "别乱按返回",
    "再跑我就生气",
    "超级不开心😤",
    "你真的很叛逆",
    "乖乖留下来",
    "只剩最后两次",
    "懒得留你了"
];

let num = 0;
const max = 10;
const txt = document.getElementById("txt");

// 核心锁死后退
history.pushState({}, "", location.href);
window.onpopstate = function(){
    num++;
    txt.innerText = list[num-1];
    if(num < max){
        history.pushState({}, "", location.href);
    }
};

// 禁止关闭提示
window.onbeforeunload = null;
</script>

</body>
</html>
