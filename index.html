<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kuromi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  width:100vw;
  height:100vh;
  background:#2c1b42;
  overflow:hidden;
  position:fixed;
}
.float-word{
  position:absolute;
  color:#e8c8ff;
  font-size:24px;
  font-weight:bold;
  white-space:nowrap;
  opacity:0.35;
  animation:up 12s linear infinite;
}
@keyframes up{
  0%{bottom:-60px;opacity:0;}
  20%{opacity:0.4;}
  100%{bottom:100vh;opacity:0;}
}
.box{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  color:#ffc8e0;
  font-weight:bold;
  text-align:center;
}
</style>
</head>
<body>

<div class="box" id="txt">库洛米 Kuromi</div>

<script>
// 漂浮文字
const word = ["库洛米","Kuromi"];
function add(){
  let d = document.createElement("div");
  d.className = "float-word";
  d.innerText = word[Math.floor(Math.random()*word.length)];
  d.style.left = Math.random()*95+"vw";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),20000);
}
setInterval(add,600);
for(let i=0;i<20;i++)add();

// 10句生气文案
const msg = [
    "不准走！",
    "你想逃跑？",
    "我要生气了",
    "别乱按返回",
    "再跑试试看",
    "超级生气😤",
    "你很不听话",
    "乖乖留下来",
    "最后一次警告",
    "走吧走吧～"
];

let count = 0;
const max = 10;
let txt = document.getElementById("txt");

// 初始化锁定
history.pushState("", "", location.href);

window.addEventListener("popstate", function(){
    count++;
    txt.innerText = msg[count - 1];

    // 前9次：锁住，不让退
    if(count < max){
        history.pushState("", "", location.href);
    }else{
        // 第10次：不拦截，允许直接退出
        history.back();
    }
});

window.onbeforeunload = null;
</script>
</body>
</html>
